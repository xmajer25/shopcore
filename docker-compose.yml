services:
  product-db:
    image: postgres:16-alpine
    container_name: shopcore-product-db
    environment:
      POSTGRES_DB: shop_product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - shopcore-network

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: shopcore-product-service
    depends_on:
      - product-db
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://product-db:5432/shop_product_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8081"
    networks:
      - shopcore-network

volumes:
  product-db-data:

networks:
  shopcore-network:
    driver: bridge