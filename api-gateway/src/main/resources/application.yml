spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://auth-service:8082
              predicates:
                - Path=/api/auth/**,/api/users/**,/api/admin/**

            - id: product-service
              uri: http://product-service:8081
              predicates:
                - Path=/api/products/**

            - id: order-service
              uri: http://order-service:8083
              predicates:
                - Path=/api/orders/**

            - id: auth-service-docs
              uri: http://auth-service:8082
              predicates:
                - Path=/auth-service/v3/api-docs
              filters:
                - RewritePath=/auth-service/v3/api-docs,/v3/api-docs

            - id: product-service-docs
              uri: http://product-service:8081
              predicates:
                - Path=/product-service/v3/api-docs
              filters:
                - RewritePath=/product-service/v3/api-docs,/v3/api-docs

            - id: order-service-docs
              uri: http://order-service:8083
              predicates:
                - Path=/order-service/v3/api-docs
              filters:
                - RewritePath=/order-service/v3/api-docs,/v3/api-docs

server:
  port: ${SERVER_PORT:8080}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:change-this-secret-change-this-secret-123456}

springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /auth-service/v3/api-docs
      - name: product-service
        url: /product-service/v3/api-docs
      - name: order-service
        url: /order-service/v3/api-docs
    urls-primary-name: product-service