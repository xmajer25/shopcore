spring.application.name=order-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/shop_order_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.security.jwt.secret=${JWT_SECRET:change-this-secret-change-this-secret-123456}

app.services.product-service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.xmajer.shopcore.*
spring.kafka.consumer.properties.spring.json.type.mapping=paymentCompleted:com.xmajer.shopcore.orderservice.messaging.event.PaymentCompletedEvent,orderPaymentRequest:com.xmajer.shopcore.orderservice.messaging.event.OrderPaymentRequestEvent

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.spring.json.type.mapping=orderPaymentRequest:com.xmajer.shopcore.orderservice.messaging.event.OrderPaymentRequestEvent,paymentCompleted:com.xmajer.shopcore.orderservice.messaging.event.PaymentCompletedEvent